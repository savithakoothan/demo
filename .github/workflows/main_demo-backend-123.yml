name: Build and deploy Node.js app to Azure Web App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # ✅ updated from v3

      - name: Set up Node.js
        uses: actions/setup-node@v4 # ✅ updated from v3
        with:
          node-version: "22.x" # ✅ changed from '22-lts' (not valid here)

      - name: Install dependencies & build
        run: |
          npm install
          npm run build --if-present

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3 # ✅ updated from v2
        with:
          app-name: "demo" # ← replace with your actual app name
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
